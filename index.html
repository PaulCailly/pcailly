<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paul Cailly</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="terminal">
    <div class="terminal-header">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>
    </div>
    <div class="terminal-body">
      <p class="line"><span class="prompt">$</span> whoami</p>
      <p class="output">Paul Cailly</p>
      <p class="line"><span class="prompt">$</span> cat links.txt</p>
      <div class="links">
        <a href="https://github.com/PaulCailly" target="_blank" rel="noopener">
          <i class="fab fa-github"></i>
        </a>
        <a href="https://linkedin.com/in/paulcailly" target="_blank" rel="noopener">
          <i class="fab fa-linkedin"></i>
        </a>
        <a href="mailto:hello@pcailly.com">
          <i class="fas fa-envelope"></i>
        </a>
      </div>
      <p class="line"><span class="prompt">$</span> <span class="cursor">_</span></p>
    </div>
  </div>
</body>
</html>
