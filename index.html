<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paul Cailly</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="matrix-canvas"></canvas>
  <div class="scanlines"></div>
  <div class="terminal" id="terminal">
    <div class="terminal-header">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>
      <span class="terminal-title">paul@pcailly: ~</span>
    </div>
    <div class="terminal-body" id="output"></div>
    <div class="input-line" id="input-line">
      <span class="prompt-user">paul@pcailly</span><span class="prompt-colon">:</span><span class="prompt-path">~</span><span class="prompt-dollar">$</span>
      <div class="input-wrapper">
        <span id="input-hint" class="input-hint">type help</span>
        <span id="input-display"></span><span class="cursor" id="cursor">_</span>
        <input type="text" id="command-input" autocomplete="off" autocapitalize="off" spellcheck="false" autofocus>
      </div>
    </div>
  </div>
  <script src="terminal.js"></script>
</body>
</html>
